    <header>
    <h1>📊 Historique des ventes</h1>
    </header>

    <main>

        <!-- FILTRE PAR DATE -->

        <input
            type="date" id="filtre-date" class="input">

        <!-- FILTRE PAR CATEGORIE -->

        <select id="filtre-categorie" class="input">

            <option value="">Toutes les catégories</option>
            <option value="Croquettes">Croquettes</option>
            <option value="Friandises">Friandises</option>
            <option value="Accessoires">Accessoires</option>
            <option value="Jouets">Jouets</option>
            <option value="Hygiène">Hygiène</option>
            <option value="Médicaments">Médicaments</option>
        </select>

        <!-- BOUTON RESET -->

        <button id="reset-filtre">
            Afficher tout
        </button>

        <!-- LISTE DES VENTES -->

        <div id="liste-ventes"></div>

    </main>
